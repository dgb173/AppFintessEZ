services:
  - type: web
    name: app-fitness-ez
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SYNC_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: app-fitness-ez-db
          property: connectionString

databases:
  - name: app-fitness-ez-db
    plan: free
